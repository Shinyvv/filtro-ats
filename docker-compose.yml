services:
  postgres:
    image: postgres:18
    container_name: filtro-ats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: filtro_ats
    ports:
      - "5433:5432"
    volumes:
      - filtro_ats_postgres_data:/var/lib/postgresql

volumes:
  filtro_ats_postgres_data:
